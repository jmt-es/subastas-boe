<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e"/>
      <stop offset="100%" style="stop-color:#12141f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b973"/>
      <stop offset="100%" style="stop-color:#c4944a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Gavel head -->
  <rect x="140" y="120" width="180" height="80" rx="16" fill="url(#gold)" transform="rotate(-45 230 160)"/>
  <!-- Gavel handle -->
  <rect x="220" y="180" width="28" height="200" rx="14" fill="url(#gold)" transform="rotate(-45 234 280)"/>
  <!-- Sound block -->
  <rect x="280" y="340" width="140" height="36" rx="8" fill="url(#gold)" opacity="0.6"/>
  <!-- BOE text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="72" fill="#e8b973" letter-spacing="12">BOE</text>
</svg>
